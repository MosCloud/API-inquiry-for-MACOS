name: CI

on:
  push:
    branches:
      - main
      - "v0.3.*"
      - "v0.4.*"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run core test runner
        run: swift run APIInquiryCoreTestsRunner

      - name: Build all targets
        run: swift build
